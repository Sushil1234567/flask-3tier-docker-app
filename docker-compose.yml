


version: '3.8'

services:
  web:
    build: ./app
    ports:
      - "5000:5000"
    networks:
        - 3-tier  
    depends_on:
      - db
      - redis
    env_file:
      - .env
   

  db:
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    networks:
        - 3-tier  
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7
    restart: always
    networks:
        - 3-tier
    ports:
      - "6379:6379"

volumes:
  db_data:
  
networks:
  3-tier:
    driver: bridge
















